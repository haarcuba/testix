name: BasicSetup
description: basic setup
inputs:
  python_version:
    description: 'Python version'
    type: string
    required: false
    default: '3.14'


runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ inputs.python_version }}
    - name: Install uv
      uses: astral-sh/setup-uv@v5
    - name: Install Project
      run: uv sync
      shell: bash
